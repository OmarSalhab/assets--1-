# fly.toml app configuration file generated for tedxcountdown on 2026-03-13T15:09:38Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tedxcountdown'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_DIR = "/data"
  ASSETS_DIR = "/data/assets"

[mounts]
  source = "event_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
